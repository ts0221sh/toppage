<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フライパンツール一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a2e;
    --bg2: #220d3a;
    --surface: rgba(138, 80, 220, 0.12);
    --surface-hover: rgba(138, 80, 220, 0.22);
    --border: rgba(180, 120, 255, 0.2);
    --border-hover: rgba(200, 150, 255, 0.6);
    --accent: #c084fc;
    --accent2: #e879f9;
    --text: #f0e6ff;
    --sub: rgba(200, 170, 255, 0.45);
    --glow: rgba(192, 132, 252, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    padding: 64px 24px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景の光彩 */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(168, 85, 247, 0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(232, 121, 249, 0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  header {
    margin-bottom: 64px;
    text-align: center;
  }

  .pan-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-size: clamp(28px, 7vw, 52px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #e879f9 0%, #c084fc 40%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(192, 132, 252, 0.3));
  }

  .subtitle {
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--sub);
    letter-spacing: 0.15em;
  }

  /* カード一覧 */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  a.card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  a.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232, 121, 249, 0.06) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  a.card:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(168, 85, 247, 0.2), 0 0 0 1px rgba(200, 150, 255, 0.1);
  }

  a.card:hover::before { opacity: 1; }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .card-arrow {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  a.card:hover .card-arrow {
    transform: translateX(5px);
    color: var(--accent2);
  }

  /* ステータス */
  .status {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--sub);
    padding: 40px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
    50% { opacity: 0.2; box-shadow: none; }
  }

  /* フッター */
  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--sub);
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

  /* カード入場アニメ */
  .card {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="pan-icon">🍳</span>
    <h1>フライパンツール一覧</h1>

  </header>

  <div class="status" id="status">
    <span class="dot"></span>
    <span>読み込み中...</span>
  </div>

  <div class="links" id="links"></div>

  <footer id="footer"></footer>

</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxWzBIuP0aClEnP45jPjG2dxBigWqwbgBCACRqKHWgYGDMJQ_OMrwIWF8XbKxBHWmY16w/exec";

async function load() {
  const status = document.getElementById("status");
  const linksEl = document.getElementById("links");
  const footer = document.getElementById("footer");

  try {
    const res = await fetch(GAS_URL);
    const links = await res.json();

    status.style.display = "none";

    if (links.length === 0) {
      status.style.display = "flex";
      status.innerHTML = "スプレッドシートにリンクがありません";
      return;
    }

    links.forEach(({ name, url }, i) => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.style.animationDelay = `${i * 0.07}s`;
      a.innerHTML = `
        <span class="card-name">${name}</span>
        <span class="card-arrow">→</span>
      `;
      linksEl.appendChild(a);
    });

    footer.textContent = `${links.length} tools`;

  } catch (e) {
    status.innerHTML = '<span>読み込みに失敗しました</span>';
    console.error(e);
  }
}

load();
</script>
</body>
</html>
